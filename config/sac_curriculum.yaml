behaviors:
  CarAgent:
    trainer_type: sac
    hyperparameters:
      learning_rate: 3.0e-4
      learning_rate_schedule: constant
      batch_size: 256
      buffer_size: 500000
      buffer_init_steps: 0
      tau: 0.005
      steps_per_update: 10.0
      save_replay_buffer: false
      init_entcoef: 0.5
      reward_signal_steps_per_update: 10.0
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 2
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 5
    checkpoint_interval: 200000
    max_steps: 2600000
    time_horizon: 128
    summary_freq: 10000
    threaded: true

# Normal learning: se la scena usa un TrackManager con "track_level", scommenta:
# environment_parameters:
#   track_level: 2.0

torch_settings:
  device: cpu
