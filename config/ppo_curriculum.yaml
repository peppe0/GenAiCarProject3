behaviors:
  CarAgent:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 2
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 5
    checkpoint_interval: 200000
    max_steps: 2000000
    time_horizon: 128
    summary_freq: 10000
    threaded: true

# --- CURRICULUM LEARNING ---
# RICHIEDE un TrackManager in scena che legga "track_level" e attivi la pista
# corrispondente: 0 = semplice, 1 = intermedio, 2 = complesso.
# La difficolta' avanza automaticamente quando la reward media supera "threshold".
environment_parameters:
  track_level:
    curriculum:
      - name: Semplice
        completion_criteria:
          measure: reward
          behavior: CarAgent
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 15.0
        value: 0.0
      - name: Intermedio
        completion_criteria:
          measure: reward
          behavior: CarAgent
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 15.0
        value: 1.0
      - name: Complesso
        value: 2.0

torch_settings:
  device: cpu
