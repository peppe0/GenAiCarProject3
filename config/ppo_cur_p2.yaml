# ==============================================================
# CURRICULUM (transfer) - FASE 2 di 3 : circuito JUMP (intermedio)
# Budget: 1.5M step (il contatore riparte da 0 con --initialize-from).
# Lancio (dai pesi della fase 1):
#   mlagents-learn config/ppo_cur_p2.yaml --run-id=cur_jump \
#     --initialize-from=cur_closed --env=".../jumpBuild.app" \
#     --no-graphics --num-envs=2 --seed=1
# Iperparametri IDENTICI a ppo_normal.yaml (confronto equo). Cambia solo max_steps.
# ==============================================================
behaviors:
  CarAgent:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 2
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 5
    checkpoint_interval: 200000
    max_steps: 1500000
    time_horizon: 128
    summary_freq: 10000
    threaded: true

torch_settings:
  device: cpu
